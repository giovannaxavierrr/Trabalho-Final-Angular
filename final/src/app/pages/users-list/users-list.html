<app-cabecalho></app-cabecalho>

<app-container>

    <div class="contents">

        <h2 class="titulo">Lista de usuários</h2>

        @if(carregando) {
        <div>Carregando... </div>
        }

        @if(erro) {
        <div>Desculpe, usuário não encontrado :/</div>
        }

        @if (!carregando && !erro) {
        <div>
            @for(user of usuarios; track user.id) {
                <div class="infos">
                    <h5>{{ user.name }}</h5>
                    <button [routerLink]="['/users', user.id]">Mais detalhes →</button>
                </div>
            }
        </div>
        }
    </div>
</app-container>
